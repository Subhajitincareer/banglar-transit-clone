<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Details - Banglar Transit</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">বাংলার<span>TRANSIT</span></a>
      
      <!-- Hamburger Menu (Mobile) -->
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" id="nav-links">
        <a href="routes.html">Search for routes</a>
        <a href="trams.html">Trams</a>
        <a href="bus-explorer.html" class="nav-btn">Bus Explorer</a>
      </div>
    </div>
  </nav>

  <!-- SECONDARY HEADER -->
  <header class="secondary-hero details-hero">
    <button class="back-btn" onclick="history.back()">&larr; Back to Routes</button>
    <div class="header-content">
      <h1 id="detail-route-num" class="animate-card">--</h1>
      <p id="detail-route-name" class="animate-card" style="animation-delay: 0.1s;">Loading route details...</p>
      <div id="detail-route-badges" class="route-badges animate-card" style="animation-delay: 0.2s;">
        <!-- Badges injected by JS -->
      </div>
    </div>
  </header>

  <!-- ALIGNMENT SECTION -->
  <main class="page-content" style="background-color: var(--cream); padding: 4rem 1.5rem; min-height: 60vh;">
    <div class="container" style="max-width: 700px; margin: 0 auto;">
      
      <div class="alignment-container content-block" style="flex-direction: column; display: flex; gap: 0;">
        <h2 class="alignment-title">VIA / ALIGNMENT</h2>
        <div id="alignment-list" class="alignment-list">
          <div class="no-results"><strong>Fetching route stops...</strong></div>
          <!-- Stops injected here -->
        </div>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-left">
        <a href="#" class="footer-link">Go to our Facebook page</a>
      </div>
      <div class="footer-right">
        <span>Contact us at </span>
        <a href="mailto:bangapopb@gmail.com" class="footer-link">bangapopb@gmail.com</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
